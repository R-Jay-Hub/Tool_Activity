<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Name Greeting</title>

<style>

body{
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    height: 100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.container{
    background:white;
    padding:40px 50px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
    width:350px;
}

h1{
    color:#333;
    margin-bottom:10px;
    font-size:36px;
}

.description{
    color:#666;
    font-size:18px;
    margin-bottom:25px;
}

input[type="text"]{
    width:100%;
    padding:12px;
    font-size:18px;
    border-radius:6px;
    border:1px solid #ccc;
    outline:none;
    margin-bottom:20px;
}

input[type="text"]:focus{
    border-color:#4facfe;
}

button{
    width:100%;
    padding:12px;
    font-size:18px;
    background:#4facfe;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#2d8df0;
}

</style>
</head>

<body>

<div class="container">

<h1>Hello User</h1>

<p class="description">
Type your name below and click the button to receive a greeting message.
</p>

<form action="/submit-name" method="POST">

<input type="text" name="userName" placeholder="Your Name Here" required>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
